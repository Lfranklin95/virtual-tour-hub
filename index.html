<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asda Demo - Virtual Property Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: #f8fafc;
        }
        header {
            height: 75px;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 2px solid #e2e8f0;
            z-index: 10;
        }
        .header-titles h1 {
            font-size: 18px;
            color: #0f172a;
            font-weight: 600;
        }
        .header-titles p {
            font-size: 13px;
            color: #64748b;
            margin-top: 2px;
        }
        .workspace {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100vh - 75px);
        }
        .split-panel {
            width: 50%;
            height: 100%;
            position: relative;
        }
        .left-panel {
            border-right: 4px solid #cbd5e1;
        }
        /* Style for the custom maps container */
        #map-container {
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        @media (max-width: 900px) {
            .workspace {
                flex-direction: column;
            }
            .split-panel {
                width: 100%;
                height: 50%;
            }
            .left-panel {
                border-right: none;
                border-bottom: 4px solid #cbd5e1;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-titles">
            <h1>Asda Demo Virtual Interactive Dashboard</h1>
            <p>Click any property pin on the map to switch tours instantly without page redirects.</p>
        </div>
    </header>

    <div class="workspace">
        <!-- Left Panel: Programmatic API Map replaces the restrictive iframe -->
        <div class="split-panel left-panel">
            <div id="map-container"></div>
        </div>

        <!-- Right Panel: Panoee Virtual Tour Viewer Canvas -->
        <div class="split-panel">
            <iframe 
                id="tour-embeded" 
                name="tour-embeded" 
                src="https://panoee.net" 
                scrolling="no" 
                allowvr="yes" 
                allow="vr; xr; accelerometer; gyroscope; autoplay; fullscreen" 
                webkitallowfullscreen="true" 
                mozallowfullscreen="true" 
                allowfullscreen="true" 
                loading="eager">
            </iframe>
        </div>
    </div>

    <!-- Load the official Google Maps library -->
    <script src="https://googleapis.com" async defer></script>

    <script>
        let map;
        let activeInfoWindow = null;

        // 1. Initialize map and center over Lowestoft property coordinates
        function initDashboardMap() {
            const mapOptions = {
                zoom: 13,
                center: { lat: 52.478, lng: 1.753 }, // Lowestoft, UK region alignment
                mapTypeId: 'roadmap'
            };
            
            map = new google.maps.Map(document.getElementById('map-container'), mapOptions);

            // 2. Define your interactive property pins database here
            const properties = [
                {
                    title: "Lowestoft Main Site",
                    lat: 52.4782,
                    lng: 1.7534,
                    tourUrl: "https://panoee.net"
                },
                {
                    title: "Property Clone Site 2",
                    lat: 52.4850,
                    lng: 1.7420,
                    tourUrl: "https://panoee.net"
                }
            ];

            // 3. Loop through your properties database and plant live markers
            properties.forEach(prop => {
                const marker = new google.maps.Marker({
                    position: { lat: prop.lat, lng: prop.lng },
                    map: map,
                    title: prop.title
                });

                // Generate popup contents utilizing local Javascript context switches instead of href links
                const infoContent = `
                    <div style="padding: 8px; font-family: sans-serif;">
                        <h3 style="margin-bottom: 6px; font-size: 14px;">${prop.title}</h3>
                        <button onclick="switchVirtualTour('${prop.tourUrl}')" style="background: #0f172a; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;">
                            Load 360° Tour
                        </button>
                    </div>
                `;

                const infowindow = new google.maps.InfoWindow({
                    content: infoContent
                });

                marker.addListener("click", () => {
                    if (activeInfoWindow) activeInfoWindow.close();
                    infowindow.open(map, marker);
                    activeInfoWindow = infowindow;
                });
            });
        }

        // 4. Custom pipeline switch function directly swapping the iframe canvas context seamlessly
        function switchVirtualTour(targetTourUrl) {
            document.getElementById('tour-embeded').src = targetTourUrl;
        }

        // 5. Gyroscope relay engine tracker logic
        window.addEventListener("devicemotion", function(e) { 
            var iframe = document.getElementById("tour-embeded"); 
            if (iframe && iframe.contentWindow) { 
                iframe.contentWindow.postMessage({ 
                    type: "devicemotion", 
                    deviceMotionEvent: { 
                        acceleration: { x: e.acceleration.x, y: e.acceleration.y, z: e.acceleration.z }, 
                        accelerationIncludingGravity: { x: e.accelerationIncludingGravity.x, y: e.accelerationIncludingGravity.y, z: e.accelerationIncludingGravity.z }, 
                        rotationRate: { alpha: e.rotationRate.alpha, beta: e.rotationRate.beta, gamma: e.rotationRate.gamma }, 
                        interval: e.interval, 
                        timeStamp: e.timeStamp 
                    } 
                }, "*"); 
            } 
        });
    </script>
</body>
</html>
